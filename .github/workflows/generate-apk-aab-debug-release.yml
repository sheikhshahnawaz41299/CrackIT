name: Build APK & Auto-Release

env:
  APP_NAME: CrackIT

on:
  push:
    branches:
      - 'release/**'
      - 'main'
  workflow_dispatch:

# We need this permission so the Action can automatically create a Release on your repo
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set current date
        run: echo "date_today=$(date +'%Y-%m-%d')" >> $GITHUB_ENV

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install

      - name: Build Vite Web App (Production Mode)
        run: npm run build

      - name: Sync Capacitor with Android
        run: npx cap sync android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Installable APK
        run: cd android && ./gradlew assembleDebug --no-daemon

      - name: Rename APK file cleanly
        run: mv android/app/build/outputs/apk/debug/app-debug.apk android/app/build/outputs/apk/debug/${{ env.APP_NAME }}.apk

      # Keep a backup artifact just in case
      - name: Upload Clean APK to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }} Latest Build
          path: android/app/build/outputs/apk/debug/${{ env.APP_NAME }}.apk
          retention-days: 7

      # NEW: Automatically create a release and attach the APK!
      - name: Auto-Publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ env.date_today }}.${{ github.run_number }}
          name: "Latest Build: ${{ env.date_today }}"
          body: "Automated APK build for CrackIT."
          files: android/app/build/outputs/apk/debug/${{ env.APP_NAME }}.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
